name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd ~/mi-app-devops

            git pull

            sudo docker stop mi_app || true
            sudo docker rm mi_app || true

            sudo docker build --no-cache -t test-app -f docker/Dockerfile .

            sudo docker run -d -p 80:5000 --name mi_app test-app